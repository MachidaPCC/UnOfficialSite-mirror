name: mirror_all
on:
  workflow_dispatch:
jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Download files
        run: |
          for YEAR in {2007..2026}
          do
            echo "YEAR = ${YEAR}"
            for MONTH in {01..12}
            do
              echo "MONTH = ${MONTH}"
    
              URL="https://mazda1micro1vaka.yakiuchi.com/diary/${YEAR}/${MONTH}.html"
    
              mkdir -p diary/${YEAR}
              curl -sf "$URL" > diary/${YEAR}/${MONTH}.html || true
            done
          done
          
      - name: Commit and push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Fetch latest version" && git push)
